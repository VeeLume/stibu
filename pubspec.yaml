name: stibu
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # cupertino_icons: ^1.0.6
  auto_route: ^9.2.0
  flutter_localizations:
    sdk: flutter
  intl: any
  logging: ^1.2.0
  url_protocol:
    path: url_protocol
  app_links: ^6.2.0
  fluent_ui: ^4.9.1
  system_theme: ^3.0.0
  appwrite: ^14.0.0
  result_type: ^0.2.0
  bitsdojo_window: ^0.1.6
  get_it: ^7.2.0
  rxdart: ^0.28.0
  collection: ^1.18.0
  html_unescape: ^2.0.0
  http: ^1.2.2
  table_calendar: ^3.1.3
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.4
  file_picker: ^9.0.0
  sanitize_filename: ^1.0.5
  dart_helper_utils: ^4.1.0
  flutter_helper_utils: ^7.0.0
  appwrite_model_generator:
    path: ./appwrite_model_generator
  data_table_2: ^2.5.15
  system_info2: ^4.0.0
  open_filex:
    git:
      url: https://github.com/mufassalhussain/open_filex

dependency_overrides:
  flutter_web_auth_2: 4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  auto_route_generator: ^9.3.1
  build_runner: ^2.4.11
  msix: ^3.16.8

flutter:
  uses-material-design: true
  generate: true

msix_config:
  display_name: Stibu
  capabilities: internetClient
  install_certificate: false
  certificate_path: ./CERTIFICATE.pfx
  logo_path: ./logo.png
